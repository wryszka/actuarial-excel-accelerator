# Jobs for the accelerator.
#
#   setup_demo       — one-shot UC setup (idempotent). Run first.
#   run_rfr_etl      — bronze → DLT silver → gold. The monthly operational job.
#                      Cron is PAUSED by default; flip pause_status to start it.
#   validate_rfr     — smoke test the rfr_curves output.
#
# All tasks use serverless compute (environment_key, no clusters).

resources:
  jobs:

    # ─────────────────────────────────────────────────────────────────────
    # Setup — catalog + schema + volumes
    # ─────────────────────────────────────────────────────────────────────
    setup_demo:
      name: "Setup — Actuarial Excel Accelerator"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: rfr_volume_name
          default: ${var.rfr_volume_name}

      tasks:
        - task_key: uc_setup
          notebook_task:
            notebook_path: ../shared/uc_setup.py
            base_parameters:
              catalog_name:     ${var.catalog_name}
              schema_name:      ${var.schema_name}
              rfr_volume_name:  ${var.rfr_volume_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"

    # ─────────────────────────────────────────────────────────────────────
    # Demo 1 monthly ETL — bronze → silver (DLT) → gold
    # ─────────────────────────────────────────────────────────────────────
    run_rfr_etl:
      name: "Run — EIOPA RFR ETL (demo 1)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: rfr_volume_name
          default: ${var.rfr_volume_name}

      # Cron present but paused — unpause once parity against the Excel
      # is established. First business day of the month at 06:00 UTC.
      schedule:
        quartz_cron_expression: "0 0 6 1 * ?"
        timezone_id: "UTC"
        pause_status: PAUSED

      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../demo_01_rfr_etl/src/01_bronze_autoloader.py
            base_parameters:
              catalog_name:     ${var.catalog_name}
              schema_name:      ${var.schema_name}
              rfr_volume_name:  ${var.rfr_volume_name}
          environment_key: default

        - task_key: silver_dlt
          depends_on:
            - task_key: bronze_ingest
          pipeline_task:
            pipeline_id: ${resources.pipelines.silver_rfr.id}
            full_refresh: true

        - task_key: gold_publish
          depends_on:
            - task_key: silver_dlt
          notebook_task:
            notebook_path: ../demo_01_rfr_etl/src/03_gold_publish.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"

    # ─────────────────────────────────────────────────────────────────────
    # Validate — smoke test for the rfr_curves gold output
    # ─────────────────────────────────────────────────────────────────────
    validate_rfr:
      name: "Validate — RFR gold smoke test (demo 1)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: validate
          notebook_task:
            notebook_path: ../demo_01_rfr_etl/src/99_validate.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"

    # ─────────────────────────────────────────────────────────────────────
    # Demo 2A — SCR Standard Formula
    # ─────────────────────────────────────────────────────────────────────

    # Seeds scr_inputs + scr_assumptions + scr_scenarios. Run after demo 1.
    scr_setup:
      name: "Setup — SCR Standard Formula (demo 2A)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: load_inputs_assumptions
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/01_inputs_assumptions.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"

    # The full demo arc: orchestrator → MLflow sweep → register UDFs → dashboard.
    # Parity test runs after orchestrator to compare against the Excel fixture.
    scr_full_run:
      name: "Run — SCR Standard Formula (demo 2A)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: warehouse_id
          default: ${var.warehouse_id}

      tasks:
        - task_key: orchestrator
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/06_orchestrator.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
              scenario_id:  "base"
          environment_key: default

        - task_key: parity_test
          depends_on:
            - task_key: orchestrator
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/08_parity_test.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

        - task_key: scenario_sweep
          depends_on:
            - task_key: orchestrator
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/07_scenarios_mlflow.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

        - task_key: register_udfs
          depends_on:
            - task_key: orchestrator
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/09_sql_udfs.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

        - task_key: build_dashboard
          depends_on:
            - task_key: scenario_sweep
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/10_dashboard.py
            base_parameters:
              catalog_name:  ${var.catalog_name}
              schema_name:   ${var.schema_name}
              warehouse_id:  ${var.warehouse_id}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"

    scr_validate:
      name: "Validate — SCR Standard Formula (demo 2A)"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}

      tasks:
        - task_key: validate
          notebook_task:
            notebook_path: ../demo_02a_scr_sf/src/99_validate.py
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name:  ${var.schema_name}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "5"
