bundle:
  name: actuarial-excel-accelerator

# Land deployed files under a single, easy-to-find folder per user, instead of
# the default hidden `.bundle/<bundle-name>/<target>/files/` path. Each demo
# subfolder (demo_01_rfr_etl, demo_02_*, demo_03_*) ends up directly browsable
# under this root.
workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/${bundle.name}

# Variables — override at deploy time with `databricks bundle deploy --var key=value`
# or by editing the `targets:` block below. Defaults work on any serverless workspace
# with Unity Catalog, once `catalog_name` and `warehouse_id` are pointed at yours.
variables:
  catalog_name:
    description: Unity Catalog name for all accelerator tables
    default: lr_serverless_aws_us_catalog
  schema_name:
    description: Schema name shared by all demos in this accelerator
    default: actuarial_excel_demo
  warehouse_id:
    description: SQL warehouse used for ad-hoc queries from notebooks and the validate step
    default: "ab79eced8207d29b"
  rfr_volume_name:
    description: UC Volume where demo 1 EIOPA monthly RFR files land
    default: rfr_landing

# Default target works on the maintainer's serverless workspace. `dev` points
# at the dev workspace and overrides catalog + warehouse accordingly. Override
# either to your own workspace host/profile when forking.
targets:
  default:
    mode: development
    default: true
    workspace:
      host: https://fevm-lr-serverless-aws-us.cloud.databricks.com
      profile: DEFAULT

  dev:
    mode: development
    workspace:
      host: https://fevm-lr-dev-aws-us.cloud.databricks.com
      profile: DEV
    variables:
      catalog_name: lr_dev_aws_us_catalog
      warehouse_id: "a3b61648ea4809e3"

sync:
  exclude:
    - "*.bak"
    - "*.xlsm"  # Excel macro files are fixtures only — don't sync to workspace

include:
  - resources/*.yml
