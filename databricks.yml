bundle:
  name: actuarial-excel-accelerator

# Deploy to a single SHARED folder so the same path opens for everyone in the
# workspace — not a per-user home. `file_path` is overridden so the demo
# notebooks land DIRECTLY in the main folder (no `files/` segment); bundle
# state/artifacts go in a hidden `.bundle/` beside them. Each demo subfolder
# (demo_01_rfr_etl, demo_02a_scr_sf, demo_03_experience_genie) is then browsable
# at /Workspace/Shared/actuarial-excel-accelerator/<demo>/ for every user.
workspace:
  root_path: /Workspace/Shared/${bundle.name}/.bundle
  file_path: /Workspace/Shared/${bundle.name}

# Intentionally a shared deployment: let everyone in the workspace open and run
# the demo notebooks from the same path.
permissions:
  - level: CAN_MANAGE
    group_name: users

# Variables — override at deploy time with `databricks bundle deploy --var key=value`
# or by editing the `targets:` block below. Defaults work on any serverless workspace
# with Unity Catalog, once `catalog_name` and `warehouse_id` are pointed at yours.
variables:
  catalog_name:
    description: Unity Catalog name for all accelerator tables
    default: lr_serverless_aws_us_catalog
  schema_name:
    description: Schema name shared by all demos in this accelerator
    default: actuarial_excel_demo
  warehouse_id:
    description: SQL warehouse used for ad-hoc queries from notebooks and the validate step
    default: "ab79eced8207d29b"
  rfr_volume_name:
    description: UC Volume where demo 1 EIOPA monthly RFR files land
    default: rfr_landing
  exp_volume_name:
    description: UC Volume where demo 3 experience-monitoring CSV extracts land
    default: exp_landing

# Default target works on the maintainer's serverless workspace. `dev` points
# at the dev workspace and overrides catalog + warehouse accordingly. Override
# either to your own workspace host/profile when forking.
targets:
  # No `mode: development`: this bundle deploys to a fixed SHARED path (above),
  # which development mode forbids (it requires a per-user root). The bundle is
  # notebooks-only, so there are no resource names to dev-prefix anyway.
  default:
    default: true
    workspace:
      host: https://fevm-lr-serverless-aws-us.cloud.databricks.com
      profile: DEFAULT

  dev:
    workspace:
      host: https://fevm-lr-dev-aws-us.cloud.databricks.com
      profile: DEV
    variables:
      catalog_name: lr_dev_aws_us_catalog
      warehouse_id: "a3b61648ea4809e3"

sync:
  exclude:
    - "*.bak"
    - "*.xlsm"  # Excel macro files are fixtures only — don't sync to workspace

# No resources/ — this bundle just deploys the demo notebooks to a browsable
# workspace folder. The jobs + DLT pipeline (which only ran the notebooks) were
# removed; open the notebooks and run them interactively. Re-add resources/ when
# the notebooks are validated and ready to orchestrate.
